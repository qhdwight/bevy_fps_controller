[package]
name = "bevy_fps_controller"
version = "0.2.5"
edition = "2021"
authors = ["bevy_fps_controller"]
repository = "https://github.com/qhdwight/bevy_fps_controller"
categories = ["game-engines"]
license = "MIT OR Apache-2.0"
readme = "README.md"
description = "Bevy plugin that adds a Source engine inspired FPS movement controller"

[features]
default = ["xpbd"]
rapier = ["dep:bevy_rapier3d"]
xpbd = ["dep:bevy_xpbd_3d"]

[dependencies]
bevy = "0.13.0"
bevy_rapier3d = { version = "0.25.0", optional = true }
bevy_xpbd_3d = { version = "0.4.2", optional = true }

[[example]]
name = "minimal"
path = "examples/minimal.rs"
